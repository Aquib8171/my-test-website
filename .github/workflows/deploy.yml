name: Deploy Static Website to EC2

on:
  push:
    branches:
      - main # Agar aapki branch ka naam 'master' hai, to yahan master likhein

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Repository se code fetch karna
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. .pem key aur rsync ka use karke files ko Ubuntu server par copy karna
      - name: Deploy to EC2 via SSH rsync
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.EC2_HOST }}
          REMOTE_USER: ${{ secrets.EC2_USERNAME }}
          TARGET: /var/www/html/ # Nginx ka web root folder
          ARGS: "-rlgoDzvO --delete" # Puraani files clean karke nayi files sync karega